<style>

.spotify-icon { width: 30px; height: 30px; background-image: url('https://raw.githubusercontent.com/fixk1234/12344/main/Deezer%20Logo%20White%20Png%20-%20Spotify%20Icon%20Png%20White%20-%20Abstract%20Backgrounds%20PNG%20Transparent%20With%20Clear%20Background%20ID%20162778%20_%20TopPNG-Photoroom.png'); filter: invert(1) sepia(1) saturate(5) hue-rotate(240deg); }
.steam-icon { width: 44px; height: 44px; background-image: url('https://raw.githubusercontent.com/fixk1234/12344/main/Steam%20Game%20app-Photoroom.png'); filter: invert(1) sepia(1) saturate(5) hue-rotate(240deg); }
.icon-tooltip { position: absolute; bottom: 52px; left: 50%; transform: translateX(-50%) translateY(10px); background: #3c0070; color: #fff; padding: 2px 9px; font-weight: bold; border: 2px solid #dfb2ff; opacity: 0; transition: 0.2s; pointer-events: none; white-space: nowrap; z-index: 100; font-size: 14px; }

.horror-popup { position: absolute; width: 260px; background: #fff; border: 3px solid #ff00aa; box-shadow: 4px 4px 0 rgba(255, 0, 170, 0.5); font-family: 'VT323', monospace; pointer-events: none; animation: popIn 0.1s ease-out forwards; }
@keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.horror-header { background: #ff00aa; color: #fff; padding: 4px 8px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 1.2rem; letter-spacing: 1px; }
.horror-body { padding: 16px; color: #ff00aa; font-size: 1.6rem; font-weight: bold; text-align: center; line-height: 1.2; }
.glitch-active { animation: screenShake 0.05s infinite !important; }
.glitch-active::after {
  content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: repeating-linear-gradient(0deg, rgba(255,255,255,0.2) 0px, rgba(255,255,255,0.2) 1px, transparent 1px, transparent 3px), repeating-linear-gradient(90deg, rgba(0,0,0,0.3) 0px, rgba(0,0,0,0.3) 2px, transparent 2px, transparent 4px);
  background-size: 100% 4px, 6px 100%; z-index: 1000000; pointer-events: none; animation: noiseFlicker 0.03s infinite;
}
@keyframes screenShake {
  0% { transform: translate(3px, 2px); } 20% { transform: translate(-2px, -3px); }
  40% { transform: translate(-4px, 1px); } 60% { transform: translate(1px, 3px); }
  80% { transform: translate(-1px, -2px); } 100% { transform: translate(3px, 1px); }
}
@keyframes noiseFlicker { 0% { opacity: 0.9; } 50% { opacity: 1; } 100% { opacity: 0.85; } }
</style>

<body>

<div class="player" id="playerOuter">

<audio id="music" crossorigin="anonymous" src="https://raw.githubusercontent.com/fixk1234/12344/main/SpotiDownloader.com%20-%20Friesenjung%20-%20Ski%20Aggu.mp3"></audio>

<script>
const firebaseConfig = {
  apiKey: "f72ZBSsxK7e9ddz2WQCYDwPhlSDM1bnFDOaCakSD", authDomain: "ff123-2bd41.firebaseapp.com",
  databaseURL: "https://ff123-2bd41-default-rtdb.firebaseio.com", projectId: "ff123-2bd41",
  storageBucket: "ff123-2bd41.appspot.com", messagingSenderId: "100505946646", appId: "1:100505946646:web:865520845a7037da821817"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();
const visitorRef = database.ref('visitorCount');
visitorRef.transaction((v) => (v || 0) + 1);
visitorRef.on('value', (s) => {
  const val = s.val() || 0;
  document.getElementById('count').textContent = String(val).padStart(6, '0').replace(/\B(?=(\d{3})+(?!\d))/g, ",");
});

const music = document.getElementById("music");
const cd = document.getElementById("cd");
const cdWrapper = document.getElementById("cdWrapper");
const playerOuter = document.getElementById("playerOuter");
const glow = document.getElementById("glow");
const playBtn = document.getElementById("playBtn");
const progress = document.getElementById("progress");
const progressContainer = document.getElementById("progressContainer");
const timeDisplay = document.getElementById("time");
const volumeSlider = document.getElementById("volumeSlider");
const canvas = document.getElementById("visualizer");
const ctx = canvas.getContext("2d");
let audioCtx, analyser, source, dataArray, initialized = false;

function initAudio() {
  if (initialized) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  source = audioCtx.createMediaElementSource(music);
  source.connect(analyser); analyser.connect(audioCtx.destination);
  analyser.fftSize = 64; dataArray = new Uint8Array(analyser.frequencyBinCount);
  initialized = true; renderFrame();
}

function renderFrame() {
  requestAnimationFrame(renderFrame); if(!analyser) return;
  analyser.getByteFrequencyData(dataArray); ctx.clearRect(0, 0, canvas.width, canvas.height);
  const barWidth = (canvas.width / dataArray.length) * 2.0; let x = 0;
  let gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
  gradient.addColorStop(0, '#ff00aa'); gradient.addColorStop(0.5, '#b57bff'); gradient.addColorStop(1, '#00ffff');
  for (let i = 0; i < dataArray.length; i++) {
    const barHeight = (dataArray[i] / 255) * canvas.height;
    ctx.fillStyle = gradient; ctx.fillRect(x, canvas.height - barHeight, barWidth - 2, barHeight);
    x += barWidth;
  }
  const bass = dataArray[2]; 
  if (bass > 200) { 
    playerOuter.style.transform = `translate(${(Math.random() - 0.5) * 2.5}px, ${(Math.random() - 0.5) * 2.5}px)`;
    cdWrapper.style.transform = `scale(${1 + (bass / 1800)})`; glow.style.opacity = "0.8";
  } else {
    playerOuter.style.transform = "none"; cdWrapper.style.transform = "scale(1)"; glow.style.opacity = "0.3";
  }
}

playBtn.addEventListener("click", () => {
  initAudio(); if (audioCtx.state === 'suspended') audioCtx.resume();
  if (music.paused) { music.play(); cd.classList.add("spinning"); playBtn.textContent = "⏸"; } 
  else { music.pause(); cd.classList.remove("spinning"); playBtn.textContent = "▶"; }
});

music.addEventListener("timeupdate", () => {
  if (!isNaN(music.duration)) {
    progress.style.width = (music.currentTime / music.duration) * 100 + "%";
    const format = t => `${Math.floor(t/60)}:${String(Math.floor(t%60)).padStart(2,'0')}`;
    timeDisplay.textContent = `${format(music.currentTime)} / ${format(music.duration)}`;
  }
});

progressContainer.onclick = (e) => {
  const rect = progressContainer.getBoundingClientRect();
  if(!isNaN(music.duration)) music.currentTime = ((e.clientX - rect.left) / rect.width) * music.duration;
};
volumeSlider.addEventListener("input", (e) => { music.volume = e.target.value; });
document.getElementById("back5").onclick = () => music.currentTime = Math.max(0, music.currentTime - 5);
document.getElementById("forward5").onclick = () => music.currentTime = Math.min(music.duration, music.currentTime + 5);
music.addEventListener("ended", () => { cd.classList.remove("spinning"); playBtn.textContent = "▶"; progress.style.width = "0%"; });

const closeBtn = document.getElementById("closeBtn");
const messages = ["왜? 왜?", "나 버려? 나 버려?", "가지마...", "나만 두고 가는거야?", "평생 함께한다며!!", "어딜 가는거야?", "버리지마버리지마"];
let popupCount = 0; const targetPopups = 30;

function playRetroDing() {
  if(!audioCtx) return;
  const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
  osc.type = 'square'; osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);
  gain.gain.setValueAtTime(0.08, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
  osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

function playCreepyScream() {
  if(!audioCtx) return;
  const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
  osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
  osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.8);
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
  osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.8);
}

function playWhiteNoise() {
  if(!audioCtx) return;
  const bufferSize = audioCtx.sampleRate * 0.4, buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate), data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
  const noise = audioCtx.createBufferSource(), gain = audioCtx.createGain();
  noise.buffer = buffer; gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
  noise.connect(gain); gain.connect(audioCtx.destination); noise.start();
}

closeBtn.addEventListener("click", () => {
  initAudio(); if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  
  music.pause(); music.currentTime = 0;
  cd.classList.remove("spinning");
  cd.style.background = "url('https://raw.githubusercontent.com/fixk1234/12344/main/needy-streamer.gif') center/cover no-repeat";
  
  playCreepyScream();
  popupCount = 0;
  
  const spamInterval = setInterval(() => {
    if (popupCount >= targetPopups) {
      clearInterval(spamInterval);
      
      playWhiteNoise();
      document.body.style.filter = "invert(1) contrast(3) brightness(1.2)";
      document.body.classList.add("glitch-active");
      
      setTimeout(() => { location.reload(); }, 450);
      return;
    }
    createHorrorPopup(); playRetroDing(); popupCount++;
  }, 100); 
});

function createHorrorPopup() {
  const popup = document.createElement("div"); popup.className = "horror-popup";
  popup.style.left = Math.floor(Math.random() * (window.innerWidth - 290)) + "px";
  popup.style.top = Math.floor(Math.random() * (window.innerHeight - 160)) + "px";
  popup.style.zIndex = 9999 + popupCount;
  const randomMsg = messages[Math.floor(Math.random() * messages.length)];
  popup.innerHTML = `<div class="horror-header"><span>† WARNING †</span><span>✖</span></div><div class="horror-body">${randomMsg.replace(/\?/g, '?<br>')}</div>`;
  document.body.appendChild(popup);
}
</script>
